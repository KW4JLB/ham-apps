site_name: ham-apps
site_description: An app manager for Amateur Radio software on Debian and Ubuntu
site_url: https://kw4jlb.github.io/ham-apps/
repo_url: https://github.com/KW4JLB/ham-apps
repo_name: KW4JLB/ham-apps
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

plugins:
  - search

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Usage: getting-started/usage.md
  - Apps:
      - App Catalog: apps/index.md
  - Developer Guide:
      - Adding an App: dev/adding-an-app.md
      - Script Style Guide: dev/script-style.md
  - Contributing: contributing.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - tables
