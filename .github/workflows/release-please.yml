name: Release Please

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag to build and upload assets for (e.g. v1.0.0)'
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  # -----------------------------------------------------------------------
  # release-please: opens / updates the release PR and, on merge, creates
  # the GitHub Release and tag.
  # Only runs on branch pushes — skip on tag pushes and manual dispatches.
  # -----------------------------------------------------------------------
  release-please:
    if: github.ref_type == 'branch'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name:        ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token:         ${{ secrets.GITHUB_TOKEN }}
          config-file:   release-please-config.json
          manifest-file: .release-please-manifest.json

  # -----------------------------------------------------------------------
  # build: compiles the GUI binary for each supported architecture and
  # uploads the artifacts to the release.
  # Runs when:
  #   - release-please just cut a release (normal automated flow)
  #   - a version tag is pushed directly (e.g. manual tag)
  #   - workflow_dispatch with an explicit tag_name (e.g. backfill assets)
  # -----------------------------------------------------------------------
  build:
    needs: [release-please]
    if: >-
      always() && (
        (needs.release-please.result == 'success' && needs.release-please.outputs.release_created == 'true') ||
        github.ref_type == 'tag' ||
        github.event_name == 'workflow_dispatch'
      )
    strategy:
      matrix:
        include:
          - runs-on: ubuntu-latest
            goarch:   amd64
            artifact: ham-apps-gui-linux-amd64
          - runs-on: ubuntu-24.04-arm
            goarch:   arm64
            artifact: ham-apps-gui-linux-arm64
    runs-on: ${{ matrix.runs-on }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: gui/go.sum

      - name: Install Fyne build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            pkg-config \
            libgl1-mesa-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxxf86vm-dev

      - name: Build binary
        env:
          CGO_ENABLED: "1"
          GOARCH: ${{ matrix.goarch }}
        run: |
          cd gui
          go build \
            -ldflags="-s -w" \
            -o ${{ matrix.artifact }} \
            ./cmd/ham-apps-gui

      - name: Resolve tag name
        id: tag
        run: |
          if [ -n "${{ inputs.tag_name }}" ]; then
            echo "name=${{ inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ needs.release-please.outputs.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ steps.tag.outputs.name }} \
            gui/${{ matrix.artifact }} \
            --clobber
